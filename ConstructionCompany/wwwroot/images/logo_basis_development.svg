<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 180" role="img">
  <title>Basis Development</title>
  <desc>Логотип будівельної компанії Basis Development</desc>

  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2C97E"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#A8882A"/>
    </linearGradient>
  </defs>

  <!-- Фундамент -->
  <rect x="40" y="148" width="112" height="10" rx="2" fill="url(#goldGrad)"/>
  <!-- Платформа -->
  <rect x="52" y="130" width="88" height="8" rx="1.5" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- Ліва колона -->
  <rect x="58" y="72" width="16" height="58" rx="2" fill="url(#goldGrad)" opacity="0.85"/>
  <!-- Центральна колона -->
  <rect x="84" y="52" width="24" height="78" rx="2" fill="url(#goldGrad)"/>
  <!-- Права колона -->
  <rect x="118" y="72" width="16" height="58" rx="2" fill="url(#goldGrad)" opacity="0.85"/>
  <!-- Капітелі -->
  <rect x="55" y="68" width="22" height="6" rx="1" fill="url(#goldGrad)"/>
  <rect x="81" y="46" width="30" height="8" rx="1.5" fill="url(#goldGrad)"/>
  <rect x="115" y="68" width="22" height="6" rx="1" fill="url(#goldGrad)"/>
  <!-- Фронтон -->
  <polygon points="96,30 72,52 120,52" fill="url(#goldGrad)" opacity="0.95"/>
  <!-- Акцент на вершині -->
  <rect x="91" y="24" width="10" height="8" rx="1" fill="#E2C97E"/>

  <!-- BASIS -->
  <text x="178" y="95"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="700" letter-spacing="6"
        fill="#0B1F3A">BASIS</text>
  <!-- Золота лінія -->
  <rect x="178" y="103" width="440" height="2" rx="1" fill="url(#goldGrad)"/>
  <!-- DEVELOPMENT -->
  <text x="180" y="130"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="23" font-weight="400" letter-spacing="12"
        fill="#0B1F3A">DEVELOPMENT</text>
  <!-- Слоган -->
  <text x="180" y="158"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="12" font-weight="400" letter-spacing="3"
        fill="#C9A84C" opacity="0.9">НАДІЙНІСТЬ У КОЖНОМУ ПРОЕКТІ</text>
</svg>
